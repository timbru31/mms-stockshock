name: Run a security audit

on:
    push:
        branches:
            - master
    pull_request:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v7.0.1

            - uses: actions/setup-node@v7.0.0
              with:
                  node-version: "24"

            - run: npm audit
