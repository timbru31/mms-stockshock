name: Run a security audit

on:
    push:
        branches:
            - master
    pull_request:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6.0.2

            - uses: actions/setup-node@v6.3.0
              with:
                  node-version: "24"

            - run: npm audit
